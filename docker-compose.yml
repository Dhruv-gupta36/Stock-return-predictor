version: "3.9"

services:
  api:
    build:
      context: .
      target: application
    image: stock-return-predictor:latest
    container_name: srp_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - MODEL_DIR=/app/models
      - CONFIG_PATH=/app/configs/config.yaml
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  trainer:
    build:
      context: .
      target: application
    image: stock-return-predictor:latest
    container_name: srp_trainer
    command: >
      python train.py --no-optuna
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - MODEL_DIR=/app/models
      - CONFIG_PATH=/app/configs/config.yaml
    profiles:
      - training

  tests:
    build:
      context: .
      target: application
    image: stock-return-predictor:latest
    container_name: srp_tests
    command: pytest tests/ -v --tb=short --no-header
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    profiles:
      - testing
