name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --no-header \
            --cov=src \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -x
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ app/ train.py predict.py \
            --max-line-length=100 \
            --ignore=E203,W503 \
            --exclude=__pycache__,.venv

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stock-return-predictor:ci .

      - name: Verify container starts
        run: |
          docker run -d --name srp_test -p 8000:8000 \
            -e PYTHONPATH=/app \
            stock-return-predictor:ci
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop srp_test
